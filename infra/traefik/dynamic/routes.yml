http:
  routers:
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/sse`) || PathPrefix(`/openapi.json`) || PathPrefix(`/docs`)"
      entryPoints: [web]
      service: api
      priority: 100
    # /mlflow route removed — MLflow is an internal tracking backend only.
    # The platform surfaces metrics + artifacts directly in its own UI.
    minio-console:
      rule: "PathPrefix(`/minio-console`)"
      entryPoints: [web]
      service: minio-console
      priority: 80
    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: frontend
      priority: 1

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"
    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio:9001"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

