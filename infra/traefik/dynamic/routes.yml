http:
  routers:
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/sse`) || PathPrefix(`/openapi.json`) || PathPrefix(`/docs`)"
      entryPoints: [web]
      service: api
      priority: 100
    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: frontend
      priority: 1

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
