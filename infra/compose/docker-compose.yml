x-api-common: &api-common
  build:
    context: ../..
    dockerfile: apps/api/Dockerfile
  image: platform/api:latest
  env_file:
    - ../../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  # api + worker + builder all attach to both networks. models-net is only
  # used to reach per-deployment serving containers by name; platform-net
  # carries everything else (postgres, redis, builder-to-api).
  networks:
    - platform-net
    - models-net
  volumes:
    - platform-data:/var/platform-data
  restart: unless-stopped

networks:
  platform-net:
    name: platform-net
  models-net:
    name: models-net
  # Only the builder and docker-proxy talk on this network. Keeping it
  # separate means a compromise in api/worker/frontend cannot reach the
  # Docker API even via the proxy — they have no route to :2375.
  docker-proxy-net:
    name: docker-proxy-net
    internal: true

volumes:
  pgdata:
  # Explicit name so the Docker volume is exactly `platform-data`
  # (no compose-project prefix). The worker passes this name by value when
  # spawning training + serving containers — those can't infer the prefix.
  platform-data:
    name: platform-data
  # MinIO object store. Hosts MLflow artifact buckets.
  minio-data:
    name: minio-data

services:
  proxy:
    image: traefik:v3.1
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.traefik.address=:8080
      - --api.dashboard=true
      - --api.insecure=true
      - --accesslog=true
      - --accesslog.format=json
      - --ping=true
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - platform-net
      - models-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the `mlflow` database on fresh pgdata. Idempotent: if
      # pgdata already exists the script is never re-run (docker
      # entrypoint convention). For an existing install, create the
      # mlflow DB manually — see the script header.
      - ../postgres/init-mlflow-db.sh:/docker-entrypoint-initdb.d/10-mlflow.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - platform-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # One-shot init-container that owns `alembic upgrade head`. api + worker
  # both depend on its successful completion so the DB schema is always
  # authoritative before request / job traffic arrives. Uses an advisory
  # lock so re-running concurrently (e.g. two rolling-deploy pods) is safe.
  migrate:
    <<: *api-common
    command: ["python", "-m", "aipacken.scripts.run_migrations"]
    restart: "no"
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
    # No Traefik network needed for a one-shot migration.
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # Traefik runs with the file provider only — api + frontend + per-model
  # routes all live under infra/traefik/dynamic/*.yml. The compose labels
  # that used to duplicate the static routes have been removed; the worker
  # rewrites infra/traefik/dynamic/models.yml whenever a deployment
  # starts/stops (aipacken.docker_client.traefik_sync).
  api:
    <<: *api-common
    command: ["uvicorn", "aipacken.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # /api/healthz is the api liveness endpoint (health router mounted
      # under /api prefix; the route itself is /healthz).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/healthz',timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # Fast queue: profile_dataset, deploy_model, teardown_deployment,
  # cleanup, ping. Seconds-scale housekeeping + deploy orchestration.
  worker-fast:
    <<: *api-common
    command: ["arq", "aipacken.jobs.worker.FastWorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      TRAEFIK_DYNAMIC_DIR: /etc/traefik/dynamic
    volumes:
      - platform-data:/var/platform-data
      # RW mount for the Traefik dynamic-routes dir so the worker can
      # publish per-model routes as deployments come and go.
      - ../traefik/dynamic:/etc/traefik/dynamic
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if any('arq' in open(f'/proc/{p}/cmdline','rb').read().decode(errors='ignore') for p in os.listdir('/proc') if p.isdigit() and os.path.isdir(f'/proc/{p}')) else 1)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # Slow queue: train_run, analyze_run, build_package. Minutes-to-hours
  # ML workloads. Isolated from the fast queue so a hung trainer cannot
  # starve housekeeping.
  worker-slow:
    <<: *api-common
    command: ["arq", "aipacken.jobs.worker.SlowWorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      TRAEFIK_DYNAMIC_DIR: /etc/traefik/dynamic
    volumes:
      - platform-data:/var/platform-data
      - ../traefik/dynamic:/etc/traefik/dynamic
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if any('arq' in open(f'/proc/{p}/cmdline','rb').read().decode(errors='ignore') for p in os.listdir('/proc') if p.isdigit() and os.path.isdir(f'/proc/{p}')) else 1)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  # Defence-in-depth between the builder and the host Docker socket. The
  # builder never touches /var/run/docker.sock directly; instead it talks
  # to this proxy on a dedicated 'docker-proxy-net' (not routable from
  # api/worker/models). The proxy exposes only the Docker API verbs we
  # actually use — everything else returns 403. See the allowlist below
  # for the exact verb set and how it maps to builder operations.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1
    environment:
      # Verb allowlist. Everything is 0/off by default on the image; we
      # explicitly allow only what builder_app needs.
      CONTAINERS: 1     # /run, /stop, /wait, /logs
      IMAGES: 1         # /build, image pulls, /save_image
      POST: 1           # required for /build, /run, /stop
      BUILD: 1          # explicit BUILD scope
      EVENTS: 1         # /events/stream (passed through to builder)
      PING: 1           # liveness
      VERSION: 1
      # Critical DENY list — the defaults, restated for auditability.
      AUTH: 0
      SECRETS: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      NETWORKS: 0
      VOLUMES: 0
      EXEC: 0
      COMMIT: 0
      CONFIGS: 0
      NODES: 0
      TASKS: 0
      PLUGINS: 0
      DISTRIBUTION: 0
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:2375/_ping || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  builder:
    <<: *api-common
    command: ["uvicorn", "aipacken.docker_client.builder_app:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      docker-proxy:
        condition: service_healthy
    environment:
      # docker-py reads DOCKER_HOST when present; points it at the
      # Tecnativa proxy's unauthenticated TCP endpoint (reachable only
      # on docker-proxy-net which the builder is the sole client of).
      DOCKER_HOST: "tcp://docker-proxy:2375"
    # Additional network — docker-proxy-net is not shared with any other
    # service, so a builder compromise still cannot reach the raw socket
    # directly; it can only send API calls that pass through the proxy's
    # verb allowlist.
    networks:
      - platform-net
      - models-net
      - docker-proxy-net
    volumes:
      - platform-data:/var/platform-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz',timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # MinIO — S3-compatible object store. Holds MLflow's artifact store
  # (models, metrics dumps, SHAP plots, etc). Kept local-only: no
  # Traefik route, no credentials beyond .env, no cross-AZ replication.
  # If you ever outgrow it swap for Wasabi/B2/S3 by flipping the
  # MLFLOW_S3_ENDPOINT_URL env var.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # One-shot init: create every S3_BUCKET_* bucket so downstream writers
  # (MLflow for artifacts, trainer for datasets/reports/predictions) do
  # not 404 on first use. Runs after MinIO is healthy, exits.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    entrypoint:
      - sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "[minio-init] waiting for minio…"
          sleep 2
        done
        for bucket in "$$S3_BUCKET_MLFLOW" "$$S3_BUCKET_DATASETS" "$$S3_BUCKET_ARTIFACTS" "$$S3_BUCKET_REPORTS" "$$S3_BUCKET_PREDICTIONS"; do
          if [ -n "$$bucket" ]; then
            mc mb --ignore-existing "local/$$bucket"
            echo "[minio-init] bucket $$bucket ready"
          fi
        done
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_MLFLOW: ${S3_BUCKET_MLFLOW}
      S3_BUCKET_DATASETS: ${S3_BUCKET_DATASETS}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
      S3_BUCKET_PREDICTIONS: ${S3_BUCKET_PREDICTIONS}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - platform-net
    restart: "no"

  # MLflow Tracking Server. Backend store = the Postgres `mlflow` DB
  # (created by infra/postgres/init-mlflow-db.sh on fresh pgdata).
  # Artifact store = s3://${MLFLOW_ARTIFACT_BUCKET} on the MinIO above.
  # Exposed only on platform-net — no Traefik route. The api + worker
  # + trainer reach it by DNS name; the SPA never talks to it directly.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    # Install boto3 + psycopg2-binary at container start so the MLflow
    # server can talk to both S3/MinIO and Postgres. Pinning here keeps
    # the compose file self-contained — no separate custom Dockerfile
    # needed until we start extending MLflow itself.
    entrypoint:
      - sh
      - -c
      - |
        pip install --quiet --no-cache-dir boto3==1.35.79 psycopg2-binary==2.9.10 && \
        exec mlflow server \
          --host 0.0.0.0 --port 5000 \
          --backend-store-uri "postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_MLFLOW_DB}" \
          --artifacts-destination "s3://$${S3_BUCKET_MLFLOW}" \
          --serve-artifacts \
          --default-artifact-root "s3://$${S3_BUCKET_MLFLOW}"
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MLFLOW_DB: ${POSTGRES_MLFLOW_DB}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      # boto3 (which MLflow uses to talk to MinIO) reads these by name.
      # Point them at the MinIO root creds — the MLflow server acts on
      # behalf of itself, not the user.
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_MLFLOW: ${S3_BUCKET_MLFLOW}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - platform-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    image: platform/web:latest
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      # nginx:1.27-alpine ships with wget-nc via busybox; this is the
      # minimal HTTP liveness check that doesn't need extra packages.
      test:
        ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
