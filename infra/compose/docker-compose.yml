x-api-common: &api-common
  build:
    context: ../..
    dockerfile: apps/api/Dockerfile
  image: platform/api:latest
  env_file:
    - ../../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
    minio:
      condition: service_healthy
  networks:
    - platform-net

networks:
  platform-net:
    name: platform-net
  models-net:
    name: models-net

volumes:
  pgdata:
  minio-data:

services:
  proxy:
    image: traefik:v3.1
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.traefik.address=:8080
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - platform-net
      - models-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - platform-net

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    env_file:
      - ../../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - platform-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=PathPrefix(`/minio-console`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      - "traefik.docker.network=platform-net"

  mlflow:
    build:
      context: ../mlflow
      dockerfile: Dockerfile
    image: platform/mlflow:latest
    env_file:
      - ../../.env
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_MLFLOW_DB}
      - --default-artifact-root=s3://${S3_BUCKET_MLFLOW}/
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - platform-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=PathPrefix(`/mlflow`)"
      - "traefik.http.routers.mlflow.entrypoints=web"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.mlflow-strip.stripprefix.prefixes=/mlflow"
      - "traefik.http.routers.mlflow.middlewares=mlflow-strip"
      - "traefik.docker.network=platform-net"

  api:
    <<: *api-common
    command: ["uvicorn", "aipacken.main:app", "--host", "0.0.0.0", "--port", "8000"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/sse`) || PathPrefix(`/openapi.json`) || PathPrefix(`/docs`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.docker.network=platform-net"

  worker:
    <<: *api-common
    command: ["arq", "aipacken.jobs.worker.WorkerSettings"]
    labels:
      - "traefik.enable=false"

  builder:
    <<: *api-common
    command: ["uvicorn", "aipacken.docker_client.builder_app:app", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    image: platform/web:latest
    networks:
      - platform-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=platform-net"
