services:
  api:
    command: ["uvicorn", "aipacken.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  # Base compose splits the worker pool into fast/slow queues
  # (see jobs/worker.py). Both services need the hot-reload override
  # and the bind-mount — a single `worker:` override targeted the
  # legacy WorkerSettings class and silently created an orphan
  # container that was not defined in the base stack, so ML jobs
  # enqueued to SLOW_QUEUE never ran under `make dev`.
  worker-fast:
    command: ["watchfiles", "--filter", "python", "arq aipacken.jobs.worker.FastWorkerSettings", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  worker-slow:
    command: ["watchfiles", "--filter", "python", "arq aipacken.jobs.worker.SlowWorkerSettings", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  builder:
    command: ["uvicorn", "aipacken.docker_client.builder_app:app", "--host", "0.0.0.0", "--port", "8080", "--reload", "--reload-dir", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "dev", "--host", "0.0.0.0", "--port", "80"]
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
