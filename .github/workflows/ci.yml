name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  api-lint:
    name: API lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dev deps
        run: pip install ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format (check only)
        run: ruff format --check .

  api-test:
    name: API tests (pytest + pg + redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform -d platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PLATFORM_ENV: dev
      # A throwaway key just long enough to clear the Settings min_length=32.
      PLATFORM_SECRET_KEY: "ci-test-key-ci-test-key-ci-test-key-ci"
      PLATFORM_ADMIN_EMAIL: admin@local
      PLATFORM_ADMIN_PASSWORD: change-me
      DATABASE_URL: postgresql+psycopg://platform:platform@localhost:5432/platform
      REDIS_URL: redis://localhost:6379/0
      DATA_ROOT: /tmp/platform-data
      INTERNAL_HMAC_TOKEN: ci-internal-hmac-token-for-tests-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dev deps
        run: pip install ".[dev]"
      - name: Prepare platform-data root
        run: mkdir -p "${DATA_ROOT}"
      - name: Pytest with coverage ratchet
        # The --cov-fail-under floor is an intentional ratchet — raise it
        # only after the PR that adds tests lifting the real number, so a
        # regression shows up as the gate failing, not as a silent drift.
        # Coverage config (source, omits, exclude_lines) lives in
        # apps/api/pyproject.toml under [tool.coverage.*].
        run: pytest -q --cov --cov-report=term --cov-fail-under=40

  web-typecheck-build:
    name: Web typecheck + prod build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: pnpm store dir
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Lint (eslint)
        run: pnpm lint
      - name: Typecheck + build
        run: pnpm build

  openapi-drift:
    name: OpenAPI drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install API deps
        working-directory: apps/api
        run: pip install ".[dev]"
      - name: Regenerate openapi.json
        # PLATFORM_SECRET_KEY only needs to clear Settings.min_length=32;
        # the export script doesn't hit the DB.
        env:
          PLATFORM_SECRET_KEY: "ci-openapi-export-key-ci-openapi-export-key"
          INTERNAL_HMAC_TOKEN: ci-internal-hmac-token-for-tests-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        working-directory: apps/api
        run: |
          mkdir -p ../../packages/api-spec
          python -m aipacken.scripts.export_openapi > ../../packages/api-spec/openapi.json
      - name: Diff against committed spec
        run: |
          if ! git diff --exit-code -- packages/api-spec/openapi.json; then
            echo "::error::packages/api-spec/openapi.json is out of date."
            echo "::error::Run 'make openapi' locally and commit the regenerated file."
            exit 1
          fi

  web-test:
    name: Web unit tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Vitest
        run: pnpm test --run

  web-e2e-smoke:
    name: Web e2e smoke (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run smoke
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
